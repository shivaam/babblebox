{% extends "base.html" %}

{% load django_vite %}

{% block content %}
  {% if request.user.is_authenticated %}
    {% csrf_token %}
    {% vite_asset 'js/chat-home/tmp-scroll-html-css/index.tsx' %}


    <div id="root" class="bg-white dark:bg-blue""></div>
  {% else %}
    <!-- Link to allauth sign-up page -->
    <a href="{% url 'account_login' %}">Sign In</a>
  {% endif %}


{% endblock content %}
