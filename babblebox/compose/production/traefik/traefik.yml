log:
  level: DEBUG

accessLog: {}
  # filePath: /etc/traefik/access.log - remove {} to enable logs to a file.

entryPoints:
  web:
    # http
    address: ':80'

  web-secure:
    # https
    address: ':443'

http:
  routers:
    web-router:
      rule: 'Host(`babblebox-app.shivamrastogi.com`) || Host(`localhost`)'
      entryPoints:
        - web
      middlewares:
        - csrf
      service: django
    web-secure-router:
      entryPoints:
        - web-secure
      middlewares:
        - csrf
      service: django

  middlewares:
    csrf:
      # https://doc.traefik.io/traefik/master/middlewares/http/headers/#hostsproxyheaders
      # https://docs.djangoproject.com/en/dev/ref/csrf/#ajax
      headers:
        hostsProxyHeaders: ['X-CSRFToken']

  services:
    django:
      loadBalancer:
        servers:
          - url: http://django:5000

providers:
  # https://doc.traefik.io/traefik/master/providers/file/
  file:
    filename: /etc/traefik/traefik.yml
    watch: true
